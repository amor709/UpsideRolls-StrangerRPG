{% extends 'base.html' %}
{% block title %}Eliminar Personaje{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Eliminar Personaje</h2>
    <p>¿Estás seguro que quieres eliminar "{{ object.nombre }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Eliminar</button>
        <a href="{% url 'game:personaje_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
