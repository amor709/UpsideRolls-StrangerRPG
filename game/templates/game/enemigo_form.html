{% extends 'base.html' %}
{% block title %}Formulario Enemigo{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>{% if form.instance.pk %}Editar Enemigo{% else %}Crear Enemigo{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{% url 'game:enemigo_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
