{% extends 'base.html' %}
{% block title %}Eliminar Campaña{% endblock %}

{% block content %}
<h1>Eliminar Campaña</h1>
<p>¿Estás seguro de que quieres eliminar la campaña "{{ object.titulo }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
    <a href="{% url 'game:campana' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
