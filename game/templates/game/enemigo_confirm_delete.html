{% extends 'base.html' %}
{% block title %}Borrar Enemigo{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Confirmar borrado de enemigo</h2>
    <p>¿Estás seguro de que deseas eliminar al enemigo <strong>{{ object.nombre }}</strong> de la campaña <strong>{{ object.campana.titulo }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Borrar</button>
        <a href="{% url 'game:enemigo_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
