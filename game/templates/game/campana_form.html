{% extends 'base.html' %}
{% block title %}Formulario Campaña{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>{% if form.instance.pk %}Editar Campaña{% else %}Crear Campaña{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{% url 'game:campana' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
